{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: var(--bg-secondary); border-radius: 20px; box-shadow: var(--card-shadow);">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">
        <i class="fas fa-sign-in-alt"></i> Admin Login
    </h2>
    
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" required value="admin">
        </div>
        
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control" required value="admin123">
        </div>
        
        {% if error %}
        <div style="color: var(--danger); margin-bottom: 1rem; padding: 0.5rem; background: rgba(198, 93, 75, 0.1); border-radius: 8px;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
        
        <p style="text-align: center; margin-top: 1rem; color: var(--text-muted); font-size: 0.9rem;">
            Default: admin / admin123
        </p>
    </form>
</div>
{% endblock %}
